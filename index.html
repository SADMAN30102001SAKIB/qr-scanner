<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple QR Scanner</title>

  <!-- QR Scanner Library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      margin: 0;
      padding: 16px;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #020617;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      font-size: 1.2rem;
      margin-bottom: 12px;
    }

    #reader {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
    }

    .status {
      margin-top: 12px;
      font-size: 0.9rem;
      text-align: center;
      color: #94a3b8;
    }

    .result {
      margin-top: 16px;
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 12px;
      word-break: break-all;
    }

    .result a {
      color: #38bdf8;
      text-decoration: none;
    }

    .result a:hover {
      text-decoration: underline;
    }

    .hidden {
      display: none;
    }

    button {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      color: #020617;
      font-weight: 600;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>QR Code Scanner</h1>

    <div id="reader"></div>

    <div class="status" id="status">
      Allow camera access and point at a QR code
    </div>

    <div class="result hidden" id="result">
      <strong>Detected link:</strong><br />
      <a id="link" href="#" target="_blank" rel="noopener noreferrer"></a>
    </div>

    <button id="rescan" class="hidden">Scan another</button>
  </div>

  <script>
    const resultBox = document.getElementById("result");
    const linkEl = document.getElementById("link");
    const statusEl = document.getElementById("status");
    const rescanBtn = document.getElementById("rescan");

    const qr = new Html5Qrcode("reader");

    function startScanner() {
      statusEl.textContent = "Scanning…";

      qr.start(
        { facingMode: "environment" }, // back camera
        {
          fps: 10,
          qrbox: { width: 250, height: 250 }
        },
        (decodedText) => {
          // SUCCESS
          qr.stop();

          resultBox.classList.remove("hidden");
          rescanBtn.classList.remove("hidden");

          linkEl.textContent = decodedText;
          linkEl.href = decodedText;

          statusEl.textContent = "QR code detected";
        },
        () => {
          // ignore scan errors (normal behavior)
        }
      ).catch(err => {
        statusEl.textContent = "Camera not available or permission denied";
        console.error(err);
      });
    }

    rescanBtn.addEventListener("click", () => {
      resultBox.classList.add("hidden");
      rescanBtn.classList.add("hidden");
      startScanner();
    });

    // Auto-start on load
    startScanner();
  </script>

</body>
</html>
