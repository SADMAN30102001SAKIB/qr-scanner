<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QR Scanner</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#020617" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />

  <!-- QR Library -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }

    body {
      margin: 0;
      padding: 16px;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: #020617;
      border-radius: 12px;
    }

    h1 {
      text-align: center;
      margin-bottom: 12px;
      font-size: 1.2rem;
    }

    #reader {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
    }

    .status {
      margin: 10px 0;
      text-align: center;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .card {
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
      word-break: break-all;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    button {
      margin-top: 8px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      background: #38bdf8;
      color: #020617;
      cursor: pointer;
    }

    .secondary {
      background: #1e293b;
      color: #e5e7eb;
    }

    .hidden {
      display: none;
    }

    .history {
      margin-top: 16px;
    }

    .history h2 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .history-item {
      font-size: 0.85rem;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<div class="app">
  <h1>QR Scanner</h1>

  <div id="reader"></div>

  <div class="status" id="status">
    Allow camera access
  </div>

  <div id="result" class="card hidden">
    <strong>Scanned:</strong><br>
    <a id="link" target="_blank"></a>
    <button id="copy">Copy link</button>
  </div>

  <button id="rescan" class="hidden secondary">Scan again</button>

  <div class="history">
    <h2>History</h2>
    <div id="historyList"></div>
  </div>
</div>

<script>
  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");
  const linkEl = document.getElementById("link");
  const rescanBtn = document.getElementById("rescan");
  const copyBtn = document.getElementById("copy");
  const historyList = document.getElementById("historyList");

  const scanner = new Html5Qrcode("reader");

  function loadHistory() {
    const history = JSON.parse(localStorage.getItem("qr-history") || "[]");
    historyList.innerHTML = "";
    history.slice(0, 5).forEach(item => {
      const div = document.createElement("div");
      div.className = "history-item";
      div.textContent = item;
      historyList.appendChild(div);
    });
  }

  function saveHistory(text) {
    const history = JSON.parse(localStorage.getItem("qr-history") || "[]");
    history.unshift(text);
    localStorage.setItem("qr-history", JSON.stringify(history.slice(0, 20)));
    loadHistory();
  }

  function startScan() {
    statusEl.textContent = "Scanning…";
    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      text => {
        scanner.stop();
        linkEl.textContent = text;
        linkEl.href = text;
        resultEl.classList.remove("hidden");
        rescanBtn.classList.remove("hidden");
        statusEl.textContent = "QR detected";
        saveHistory(text);
      }
    ).catch(() => {
      statusEl.textContent = "Camera unavailable";
    });
  }

  copyBtn.onclick = () => {
    navigator.clipboard.writeText(linkEl.textContent);
    copyBtn.textContent = "Copied!";
    setTimeout(() => copyBtn.textContent = "Copy link", 1200);
  };

  rescanBtn.onclick = () => {
    resultEl.classList.add("hidden");
    rescanBtn.classList.add("hidden");
    startScan();
  };

  loadHistory();
  startScan();

  // Register Service Worker
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
</script>

</body>
</html>
