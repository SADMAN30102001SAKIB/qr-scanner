<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QR Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#020617" />
  <meta name="description" content="Fast, offline-ready QR code scanner PWA" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json" />

  <!--
    BUG 1 FIX: library timing race.
    Create a Promise that resolves once whichever script (local or CDN)
    actually finishes loading. Init code awaits this before running.
  -->
  <script>
    window.__qrLibPromise = new Promise(function(resolve) {
      window.__qrLibReady = resolve;
    });
  </script>
  <script
    src="html5-qrcode.min.js"
    onload="window.__qrLibReady(true)"
    onerror="
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
      s.onload  = function() { window.__qrLibReady(true); };
      s.onerror = function() {
        window.__qrLibReady(false);
        document.getElementById('lib-error').classList.remove('hidden');
      };
      document.head.appendChild(s);
    "
  ></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #020617;
      --surface:     #0f172a;
      --border:      #1e293b;
      --text:        #e5e7eb;
      --muted:       #94a3b8;
      --accent:      #38bdf8;
      --accent-dark: #0284c7;
      --success:     #22c55e;
      --danger:      #f87171;
      --radius:      10px;
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left:   env(safe-area-inset-left,   0px);
      --safe-right:  env(safe-area-inset-right,  0px);
    }

    html { height: 100%; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding:
        calc(var(--safe-top)    + 12px)
        calc(var(--safe-right)  + 16px)
        calc(var(--safe-bottom) + 28px)
        calc(var(--safe-left)   + 16px);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #lib-error {
      background: #450a0a;
      border: 1px solid var(--danger);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 0.85rem;
      color: var(--danger);
      text-align: center;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 6px 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }

    /* ── Viewfinder ──────────────────────────────────── */
    .viewer-wrap {
      position: relative;
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
      min-height: 180px;
    }

    /*
      FIX 1 — DOUBLE VIDEO:
      html5-qrcode appends its own <video> and <canvas> into #reader.
      Force only ONE video visible and kill any extra ones.
    */
    #reader { width: 100%; }

    #reader > video {
      display: block !important;
      width: 100% !important;
      max-height: 60vh;
      object-fit: cover;
    }

    /* Hide every video after the first (duplicates) */
    #reader > video ~ video { display: none !important; }

    /* Suppress ALL built-in library UI chrome */
    #reader canvas             { display: none !important; }
    #reader img                { display: none !important; }
    #reader__scan_region       { border: none !important; box-shadow: none !important; }
    #reader__dashboard         { display: none !important; }
    #reader__header_message    { display: none !important; }
    #reader__status_span       { display: none !important; }
    #reader__filescan_input    { display: none !important; }

    /* Scan line — inside viewer-wrap, correct relative positioning */
    .scan-line {
      position: absolute;
      left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      border-radius: 2px;
      animation: scanline 2s ease-in-out infinite;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .scan-line.active { opacity: 1; }

    @keyframes scanline {
      0%   { top: 8%; }
      50%  { top: 90%; }
      100% { top: 8%; }
    }

    /* Corner brackets */
    .corners { position: absolute; inset: 0; pointer-events: none; z-index: 4; }
    .corners::before, .corners::after,
    .corners span::before, .corners span::after {
      content: ""; position: absolute;
      width: 22px; height: 22px;
      border-color: var(--accent); border-style: solid; border-width: 0;
    }
    .corners::before      { top:12px; left:12px;   border-top-width:3px;    border-left-width:3px;  border-radius:3px 0 0 0; }
    .corners::after       { top:12px; right:12px;  border-top-width:3px;    border-right-width:3px; border-radius:0 3px 0 0; }
    .corners span::before { bottom:12px; left:12px;  border-bottom-width:3px; border-left-width:3px;  border-radius:0 0 0 3px; }
    .corners span::after  { bottom:12px; right:12px; border-bottom-width:3px; border-right-width:3px; border-radius:0 0 3px 0; }

    /* ── Status ── */
    #status {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 1.3em;
      padding: 2px 0;
      transition: color 0.2s;
    }
    #status.ok  { color: var(--success); }
    #status.err { color: var(--danger); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 10px 12px;
      border-radius: var(--radius);
      border: none;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s, opacity 0.15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:active   { transform: scale(0.96); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    /* Remove browser default focus ring on click (keeps it for keyboard nav) */
    .btn:focus         { outline: none; }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:not(:disabled):hover { background: var(--accent-dark); }

    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:not(:disabled):hover { background: var(--border); }
    .btn-ghost.lit { background: #fbbf24; color: #000; border-color: #fbbf24; }

    /* ── Controls grid ── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .controls.three-col { grid-template-columns: 1fr 1fr 1fr; }

    @media (max-width: 340px) {
      .controls.three-col { grid-template-columns: 1fr 1fr; }
    }

    /* ── Toggles ── */
    .toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 20px;
      align-items: center;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle-switch { position: relative; width: 34px; height: 19px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--border); border-radius: 20px;
      transition: background 0.2s;
    }
    .toggle-track::before {
      content: ""; position: absolute;
      left: 3px; top: 3px; width: 13px; height: 13px;
      background: #fff; border-radius: 50%;
      transition: left 0.2s;
    }
    .toggle-switch input:checked + .toggle-track         { background: var(--accent); }
    .toggle-switch input:checked + .toggle-track::before { left: 18px; }

    /* ── Result card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .card-label  { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.7rem; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
      background: var(--accent); color: var(--bg);
    }

    .result-text {
      font-size: 0.88rem;
      word-break: break-all;
      overflow-wrap: anywhere;
      line-height: 1.55;
      color: var(--text);
      max-height: 180px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .result-text a   { color: var(--accent); text-decoration: none; }
    .result-text a:hover { text-decoration: underline; }
    .result-text pre { white-space: pre-wrap; font-family: inherit; }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    /* ── Install banner ── */
    #installBanner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 0.82rem;
    }
    #installBanner span { color: var(--muted); }

    /* ── History ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 0;
    }
    .section-header h2 { font-size: 0.9rem; font-weight: 600; }

    #clearHistory {
      background: none; border: none;
      color: var(--muted); font-size: 0.75rem;
      cursor: pointer; padding: 4px 6px; border-radius: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    #clearHistory:hover { color: var(--danger); }

    #historyList { display: flex; flex-direction: column; gap: 7px; }

    .history-empty {
      font-size: 0.82rem; color: var(--muted);
      text-align: center; padding: 16px;
    }

    .history-item {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .history-item:hover { border-color: var(--accent); }

    .history-icon { font-size: 1rem; flex-shrink: 0; line-height: 1.4; }
    .history-body { flex: 1; min-width: 0; }

    .history-url {
      font-size: 0.8rem;
      color: var(--accent);
      word-break: break-all;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    .history-meta { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }

    .history-copy {
      background: none; border: none;
      color: var(--muted); font-size: 1rem;
      cursor: pointer; padding: 2px 4px;
      flex-shrink: 0; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .history-copy:hover { color: var(--accent); }

    .hidden { display: none !important; }

    @media (min-width: 600px) {
      body { padding-top: 24px; }
      .app { gap: 12px; }
    }
  </style>
</head>
<body>

<div class="app">

  <div id="lib-error" class="hidden">
    ⚠️ Could not load QR library. Check your internet connection and reload.
  </div>

  <header>
    <span aria-hidden="true" style="font-size:1.3rem">📷</span>
    <h1>QR Scanner</h1>
  </header>

  <div class="viewer-wrap">
    <div id="reader" role="img" aria-label="Camera viewfinder"></div>
    <div class="scan-line" id="scanLine" aria-hidden="true"></div>
    <div class="corners" aria-hidden="true"><span></span></div>
  </div>

  <p id="status" role="status" aria-live="polite">Starting camera…</p>

  <div class="controls" id="controls">
    <button class="btn btn-ghost" id="switchCamera">⟳ Flip</button>
    <button class="btn btn-ghost" id="torchBtn">🔦 Flash</button>
    <button class="btn btn-primary hidden" id="rescanBtn">▶ Scan again</button>
  </div>

  <div class="toggles">
    <label class="toggle-label" for="autoOpenToggle">
      <span class="toggle-switch">
        <input type="checkbox" id="autoOpenToggle">
        <span class="toggle-track"></span>
      </span>
      Auto-open links
    </label>
    <label class="toggle-label" for="vibToggle">
      <span class="toggle-switch">
        <input type="checkbox" id="vibToggle" checked>
        <span class="toggle-track"></span>
      </span>
      Vibrate
    </label>
  </div>

  <div class="card hidden" id="resultCard" role="region" aria-label="Scan result">
    <div class="card-header">
      <span class="card-label">Detected</span>
      <span class="badge" id="qrBadge">📝 Text</span>
    </div>
    <div class="result-text" id="resultContent" aria-live="polite"></div>
    <div class="card-actions">
      <button class="btn btn-primary" id="actionBtn">Open</button>
      <button class="btn btn-ghost"   id="copyBtn">Copy</button>
    </div>
  </div>

  <div id="installBanner" class="hidden" role="complementary">
    <span>📲 Install as app</span>
    <button class="btn btn-primary" id="installBtn" style="flex-shrink:0;padding:8px 16px">Install</button>
  </div>

  <div class="section-header">
    <h2>History</h2>
    <button id="clearHistory" aria-label="Clear all scan history">Clear all</button>
  </div>
  <div id="historyList" role="list"></div>

</div>

<script>
"use strict";

// ─── QR intent detection ──────────────────────────────────────────────────────
const INTENTS = [
  { test: /^https?:\/\//i,    type: "URL",     icon: "🔗", action: "Open"  },
  { test: /^WIFI:/i,          type: "WiFi",    icon: "📶", action: "View"  },
  { test: /^tel:/i,           type: "Phone",   icon: "📞", action: "Call"  },
  { test: /^mailto:/i,        type: "Email",   icon: "📧", action: "Email" },
  { test: /^smsto?:/i,        type: "SMS",     icon: "💬", action: "Text"  },
  { test: /^BEGIN:VCARD/i,    type: "Contact", icon: "👤", action: "View"  },
  { test: /^geo:/i,           type: "Maps",    icon: "🗺️", action: "Map"   },
  { test: /^bitcoin:|^eth:/i, type: "Crypto",  icon: "₿",  action: "View"  },
];

function detectIntent(text) {
  for (const i of INTENTS) { if (i.test.test(text)) return { ...i }; }
  return { type: "Text", icon: "📝", action: "Copy" };
}

function parseWifi(text) {
  const g = k => text.match(new RegExp(k + ':([^;]+)'))?.[1] ?? '';
  return 'Network:  ' + (g('S') || '?') + '\nSecurity: ' + (g('T') || '?') + '\nPassword: ' + (g('P') || '(none)');
}

function buildResultNode(text, intent) {
  const wrap = document.createElement('div');
  if (intent.type === 'URL' || intent.type === 'Maps') {
    const a = document.createElement('a');
    a.href = text; a.textContent = text;
    a.target = '_blank'; a.rel = 'noopener noreferrer';
    wrap.appendChild(a);
  } else if (intent.type === 'WiFi') {
    const pre = document.createElement('pre');
    pre.textContent = parseWifi(text);
    wrap.appendChild(pre);
  } else {
    wrap.textContent = text;
  }
  return wrap;
}

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const statusEl      = document.getElementById('status');
const resultCard    = document.getElementById('resultCard');
const resultContent = document.getElementById('resultContent');
const qrBadge       = document.getElementById('qrBadge');
const actionBtn     = document.getElementById('actionBtn');
const copyBtn       = document.getElementById('copyBtn');
const rescanBtn     = document.getElementById('rescanBtn');
const switchBtn     = document.getElementById('switchCamera');
const torchBtn      = document.getElementById('torchBtn');
const autoOpenEl    = document.getElementById('autoOpenToggle');
const vibEl         = document.getElementById('vibToggle');
const historyList   = document.getElementById('historyList');
const clearBtn      = document.getElementById('clearHistory');
const scanLine      = document.getElementById('scanLine');
const controlsEl    = document.getElementById('controls');

// ─── State ────────────────────────────────────────────────────────────────────
let scanner        = null;
let scanning       = false;    // true only while scanner is physically running
let scanningIntent = false;    // true when user wants to be scanning (survives tab hide)
let starting       = false;    // lock: true while startScanner() is mid-execution
let torchOn        = false;
let torchAvailable = true;
let lastText       = '';
let lastIntent     = null;

/*
  FIX 2 — CAMERA FLIP CRASH:
  Instead of using facingMode strings (unreliable on mobile), we enumerate
  the actual device IDs from the browser and cycle between them by ID.
  This is what html5-qrcode itself recommends for switching cameras.
*/
let cameras      = [];   // [{id, label}, ...]
let cameraIndex  = 0;    // which camera we're on

function setStatus(msg, cls = '') {
  statusEl.textContent = msg;
  statusEl.className = cls;
}

function showRescan(show) {
  if (show) { rescanBtn.classList.remove('hidden'); controlsEl.classList.add('three-col'); }
  else       { rescanBtn.classList.add('hidden');   controlsEl.classList.remove('three-col'); }
}

// ─── Camera enumeration ───────────────────────────────────────────────────────
async function loadCameras() {
  try {
    const list = await Html5Qrcode.getCameras();
    if (!list || list.length === 0) {
      // Browser returned empty list — no cameras available
      disableAllCameraControls();
      return;
    }
    cameras = list;

    // Default to back camera
    const backIdx = list.findIndex(c => /back|rear|environment/i.test(c.label));
    cameraIndex = backIdx >= 0 ? backIdx : 0;

    // Single camera — disable flip
    if (list.length < 2) switchBtn.disabled = true;

  } catch (_) {
    // Enumeration failed entirely — disable flip since we can't know what's available.
    // startScanner will fall back to facingMode and handle further errors.
    switchBtn.disabled = true;
  }
}

function disableAllCameraControls() {
  switchBtn.disabled = true;
  torchBtn.disabled  = true;
  torchBtn.textContent = '🔦 N/A';
}

// ─── Scanner lifecycle ────────────────────────────────────────────────────────
async function stopScanner() {
  scanning = false;
  scanLine.classList.remove('active');
  if (scanner) {
    try { await scanner.stop(); } catch (_) {}
    scanner = null;
  }
  document.getElementById('reader').innerHTML = '';
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function startScanner() {
  if (!window.Html5Qrcode) {
    setStatus('QR library not loaded. Check your connection.', 'err');
    return;
  }

  if (starting) return;
  starting = true;

  try {
    await stopScanner();
    await delay(250);

    const viewerW = document.getElementById('reader').clientWidth || 300;
    const boxSize = Math.min(Math.round(viewerW * 0.72), 280);

    // Reset torch for this session — each camera gets a fresh attempt.
    // torchAvailable was permanently false once it failed before; that was wrong.
    torchOn        = false;
    torchAvailable = true;
    torchBtn.classList.remove('lit');
    torchBtn.textContent = '🔦 Flash';
    torchBtn.disabled    = false;

    resultCard.classList.add('hidden');
    showRescan(false);
    scanningIntent = true;

    const cameraConstraint = cameras.length > 0
      ? cameras[cameraIndex].id
      : { facingMode: 'environment' };

    // Retry loop — specifically for NotReadableError where the OS hasn't
    // released the previous MediaStream yet. 3 attempts with growing delays.
    const RETRY_DELAYS = [0, 600, 1200];
    let lastErr = null;

    for (let attempt = 0; attempt < RETRY_DELAYS.length; attempt++) {
      if (RETRY_DELAYS[attempt] > 0) {
        setStatus('Retrying camera…');
        await delay(RETRY_DELAYS[attempt]);
      }
      try {
        scanner = new Html5Qrcode('reader');
        scanning = true;
        scanLine.classList.add('active');
        setStatus('Scanning…');

        await scanner.start(
          cameraConstraint,
          {
            fps: 12,
            qrbox: { width: boxSize, height: boxSize },
            aspectRatio: window.innerWidth > window.innerHeight ? 1.5 : 1.0,
            disableFlip: false,
          },
          onDecode,
          () => {}
        );
        lastErr = null;
        break; // success — exit retry loop

      } catch (err) {
        // Clean up the failed instance before retrying
        scanning = false;
        scanLine.classList.remove('active');
        if (scanner) {
          try { await scanner.stop(); } catch (_) {}
          scanner = null;
        }
        document.getElementById('reader').innerHTML = '';
        lastErr = err;

        const msg = String(err);
        // Only retry on NotReadableError — other errors won't be helped by waiting
        if (!/notreadable|could not start/i.test(msg)) break;
      }
    }

    // All attempts exhausted — show the right error
    if (lastErr) {
      const msg = String(lastErr);
      if (/permission|denied/i.test(msg)) {
        setStatus('Camera blocked — allow access in browser settings, then reload.', 'err');
        disableAllCameraControls();
      } else if (/no cameras|notfound|no device/i.test(msg)) {
        setStatus('No camera found on this device.', 'err');
        disableAllCameraControls();
      } else if (/notreadable|could not start/i.test(msg)) {
        setStatus('Camera in use by another app. Close it and retry.', 'err');
      } else {
        setStatus('Camera unavailable. Try reloading.', 'err');
        console.error('[QR] startScanner error:', lastErr);
      }
    }

  } finally {
    starting = false;
  }
}

// ─── Decode ───────────────────────────────────────────────────────────────────
async function onDecode(text) {
  if (!scanning) return;
  await stopScanner();
  scanningIntent = false;  // user got a result — don't restart on tab return

  if (vibEl.checked) navigator.vibrate?.(130);

  lastText   = text;
  lastIntent = detectIntent(text);

  qrBadge.textContent = lastIntent.icon + ' ' + lastIntent.type;
  resultContent.innerHTML = '';
  resultContent.appendChild(buildResultNode(text, lastIntent));
  actionBtn.textContent = lastIntent.action;

  resultCard.classList.remove('hidden');
  showRescan(true);
  setStatus('QR code detected ✓', 'ok');

  saveHistory(text, lastIntent);

  if (autoOpenEl.checked && (lastIntent.type === 'URL' || lastIntent.type === 'Maps')) {
    window.open(text, '_blank', 'noopener,noreferrer');
  }
}

function displayResult(text) {
  lastText   = text;
  lastIntent = detectIntent(text);
  qrBadge.textContent = lastIntent.icon + ' ' + lastIntent.type;
  resultContent.innerHTML = '';
  resultContent.appendChild(buildResultNode(text, lastIntent));
  actionBtn.textContent = lastIntent.action;
  resultCard.classList.remove('hidden');
  showRescan(true);
  setStatus('Loaded from history', 'ok');
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ─── Controls ─────────────────────────────────────────────────────────────────
rescanBtn.onclick = () => startScanner();

switchBtn.onclick = () => {
  if (cameras.length < 2) return;
  cameraIndex = (cameraIndex + 1) % cameras.length;
  startScanner();
};

torchBtn.onclick = async () => {
  if (!scanner || !torchAvailable) return;
  try {
    torchOn = !torchOn;
    await scanner.applyVideoConstraints({ advanced: [{ torch: torchOn }] });
    torchBtn.classList.toggle('lit', torchOn);
    torchBtn.textContent = torchOn ? '💡 Flash ON' : '🔦 Flash';
  } catch (_) {
    torchOn = false;
    torchAvailable = false;
    torchBtn.textContent = '🔦 N/A';
    torchBtn.disabled = true;
  }
};

actionBtn.onclick = () => {
  if (!lastText) return;
  if (['URL','Maps','Phone','Email','SMS','Crypto'].includes(lastIntent?.type)) {
    window.open(lastText, '_blank', 'noopener,noreferrer');
  } else {
    copyText(lastText, actionBtn);
  }
};

copyBtn.onclick = () => copyText(lastText, copyBtn);

// ─── Clipboard ────────────────────────────────────────────────────────────────
function copyText(text, btn) {
  if (!text) return;
  const orig = btn.textContent;
  const done = () => { btn.textContent = '✓ Copied'; setTimeout(() => { btn.textContent = orig; }, 1500); };
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => { legacyCopy(text); done(); });
  } else { legacyCopy(text); done(); }
}

function legacyCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch (_) {}
  document.body.removeChild(ta);
}

// ─── History ──────────────────────────────────────────────────────────────────
function getHistory() {
  try { return JSON.parse(localStorage.getItem('qr-history') || '[]'); } catch { return []; }
}

function saveHistory(text, intent) {
  let h = getHistory().filter(i => i.text !== text);
  h.unshift({ text, type: intent.type, icon: intent.icon, time: Date.now() });
  try { localStorage.setItem('qr-history', JSON.stringify(h.slice(0, 30))); } catch (_) {}
  renderHistory();
}

function timeAgo(ts) {
  const m = Math.round((Date.now() - ts) / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.round(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.round(h / 24) + 'd ago';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderHistory() {
  const h = getHistory();
  historyList.innerHTML = '';
  if (!h.length) {
    historyList.innerHTML = '<div class="history-empty">No scans yet</div>';
    return;
  }
  h.slice(0, 10).forEach(item => {
    const row = document.createElement('div');
    row.className = 'history-item';
    row.setAttribute('role', 'listitem');
    row.innerHTML =
      '<span class="history-icon" aria-hidden="true">' + (item.icon || '📝') + '</span>' +
      '<div class="history-body">' +
        '<div class="history-url">' + esc(item.text) + '</div>' +
        '<div class="history-meta">' + item.type + ' · ' + timeAgo(item.time) + '</div>' +
      '</div>' +
      '<button class="history-copy" aria-label="Copy to clipboard" title="Copy">⧉</button>';

    row.addEventListener('click', e => {
      if (e.target.classList.contains('history-copy')) return;
      displayResult(item.text);
    });
    row.querySelector('.history-copy').addEventListener('click', e => {
      e.stopPropagation();
      copyText(item.text, e.currentTarget);
    });
    historyList.appendChild(row);
  });
}

clearBtn.onclick = () => {
  if (!getHistory().length) return;
  localStorage.removeItem('qr-history');
  renderHistory();
};

// ─── Page lifecycle ───────────────────────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopScanner();
    // scanning is now false, but scanningIntent remembers whether
    // the user was mid-scan vs viewing a result
  } else {
    // Only restart if the user was actively scanning before hiding
    if (scanningIntent) startScanner();
  }
});

window.addEventListener('beforeunload', () => {
  scanner?.stop().catch(() => {});
});

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (scanningIntent) startScanner(); }, 600);
});

// ─── PWA install ──────────────────────────────────────────────────────────────
let deferredPrompt = null;
const installBanner = document.getElementById('installBanner');
const installBtn    = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.classList.remove('hidden');
});

installBtn.onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') installBanner.classList.add('hidden');
  deferredPrompt = null;
};

window.addEventListener('appinstalled', () => installBanner.classList.add('hidden'));

// ─── Service Worker ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderHistory();

// BUG 1 FIX: await the library promise so we never run init before
// Html5Qrcode is defined, regardless of whether local or CDN script loads.
window.__qrLibPromise.then(function(loaded) {
  if (!loaded) return; // lib-error banner already shown by onerror handler
  loadCameras().then(() => startScanner());
});
</script>
</body>
